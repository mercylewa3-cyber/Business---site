<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mercy Business</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f4f4f4;
    }

    nav{
      background:black;
      padding:15px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:15px;
      font-size:18px;
    }

    header{
      background:blue;
      color:white;
      text-align:center;
      padding:100px 20px;
    }

    header h1{
      font-size:50px;
    }

    section{
      padding:50px 20px;
      text-align:center;
    }

    .gallery{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
    }

    .image-box{
      position:relative;
    }

    .image-box img{
      width:300px;
      border-radius:15px;
    }

    .image-text{
      position:absolute;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.6);
      color:white;
      padding:10px;
      border-radius:0 0 15px 15px;
    }

    form{
      max-width:500px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input, textarea{
      padding:15px;
      font-size:16px;
    }

    button{
      padding:15px;
      background:blue;
      color:white;
      border:none;
      font-size:18px;
      cursor:pointer;
    }

    footer{
      background:black;
      color:white;
      text-align:center;
      padding:20px;
    }

  </style>

</head>

<body>

  <nav>

    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>

  </nav>

  <header>

    <h1>Mercy Business</h1>

    <p>Welcome To My Business Website</p>

  </header>

  <section>

    <h2>About Us</h2>

    <p>
      We help businesses grow online.
    </p>

  </section>

  <section>

    <h2>Gallery</h2>

    <div class="gallery">

      <div class="image-box">

        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1000">

        <div class="image-text">
          Team Work
        </div>

      </div>

      <div class="image-box">

        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=1000">

        <div class="image-text">
          Business Meeting
        </div>

      </div>

    </div>

  </section>

  <section>

    <h2>Contact Us</h2>

    <form>

      <input type="text" placeholder="Your Name">

      <input type="email" placeholder="Your Email">

      <textarea rows="5" placeholder="Your Message"></textarea>

      <button>Send</button>

    </form>

  </section>

  <footer>

    <p>© 2026 Mercy Business</p>

  </footer>

</body>

</html>
