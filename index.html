<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercy Business</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#333;
  overflow-x:hidden;
}

/* NAVBAR */

nav{
  background:#111;
  padding:15px;
  position:sticky;
  top:0;
  z-index:1000;
}

nav ul{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
  list-style:none;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

nav a:hover{
  color:cyan;
}

/* HEADER */

header{
  height:100vh;

  background:
  linear-gradient(rgba(0,0,0,0.5),
  rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1200');

  background-size:cover;
  background-position:center;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

.header-content h1{
  font-size:60px;
  margin-bottom:20px;
  animation:slideDown 2s;
}

.typing{
  font-size:24px;
  margin-bottom:30px;
  border-right:3px solid white;
  overflow:hidden;
  white-space:nowrap;
  width:0;

  animation:
  typing 4s steps(30,end) forwards,
  blink 0.8s infinite;
}

/* BUTTON */

button{
  padding:15px 35px;
  border:none;
  border-radius:30px;
  background:cyan;
  color:black;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:white;
}

/* ANIMATIONS */

@keyframes slideDown{

  from{
    transform:translateY(-100px);
    opacity:0;
  }

  to{
    transform:translateY(0);
    opacity:1;
  }

}

@keyframes typing{

  from{
    width:0;
  }

  to{
    width:100%;
  }

}

@keyframes blink{

  50%{
    border-color:transparent;
  }

}

/* SECTIONS */

section{
  padding:80px 20px;
  text-align:center;
}

section h2{
  font-size:40px;
  margin-bottom:20px;
}

section p{
  max-width:700px;
  margin:auto;
  font-size:18px;
}

/* SERVICES */

.services-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
